<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>GeoVigil Analytics</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #161b22;
      --surface2:#21262d;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --high:    #E53935;
      --mid:     #FB8C00;
      --low:     #1E88E5;
      --green:   #3fb950;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; overflow: hidden; }

    /* ── Layout ── */
    .layout { display: flex; height: 100dvh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 0; flex-shrink: 0;
      background: var(--surface);
      border-right: 0px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease, border-width 0.25s ease;
      z-index: 300;
    }
    .sidebar.open { width: 280px; border-right-width: 1px; overflow-y: auto; }
    .sidebar-inner { min-width: 280px; padding: 20px 18px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Main ── */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    .header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header-center { flex: 1; text-align: center; }
    .title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 600; letter-spacing: 0.05em; line-height: 1.0; color: var(--text); }
    .subtitle { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
    .sidebar-logo { width: 100%; max-width: 200px; height: auto; display: block; margin: 0 auto 4px; }

    /* ── Filter bar ── */
    .filter-bar { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .filter-bar-row { display: flex; align-items: center; gap: 10px; }
    .filter-bar label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .filter-bar input[type=range] { flex: 1; }
    .badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 0.82rem; color: var(--accent); white-space: nowrap; font-weight: 500; }

    /* ── Map area (relative for card overlay) ── */
    .map-area { flex: 1; position: relative; min-height: 0; }
    #map { position: absolute; inset: 0; }

    /* ── Card strip overlay ── */
    .card-strip-wrap {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 1000;
      transition: transform 0.3s ease;
    }
    .card-strip-wrap.collapsed { transform: translateY(calc(100% - 36px)); }

    /* Handle bar */
    .strip-handle {
      display: flex; align-items: center; justify-content: center;
      padding: 6px 12px 4px;
      position: relative;
    }
    .strip-pill {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.25);
      cursor: grab;
    }
    .strip-collapse-btn {
      position: absolute; right: 12px;
      background: rgba(22,27,34,0.75);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.7rem;
      padding: 3px 8px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.15s;
      white-space: nowrap;
    }
    .strip-collapse-btn:hover { color: var(--text); }
    .card-strip-wrap.collapsed .strip-collapse-btn { color: var(--accent); }

    /* Cards */
    .card-strip {
      display: flex; gap: 10px;
      padding: 4px 50% 12px;
      overflow-x: auto; scroll-snap-type: x mandatory;
      scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .card-strip::-webkit-scrollbar { display: none; }
    .card {
      scroll-snap-align: center; flex-shrink: 0; width: 200px;
      background: rgba(22,27,34,0.72);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(48,54,61,0.7);
      border-radius: 12px; padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
      opacity: 0.6;
    }
    .card.selected { opacity: 1; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
    .card-conf { font-size: 1.15rem; font-weight: 700; }
    .card-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
    .card-dot-active { background: #3fb950; box-shadow: 0 0 0 0 rgba(63,185,80,0.6); animation: pulse-green 2s infinite; }
    .card-dot-unconfirmed { background: #d29922; }
    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0 rgba(63,185,80,0.6); }
      70%  { box-shadow: 0 0 0 5px rgba(63,185,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
    }
    .card-row { font-size: 0.78rem; color: var(--muted); line-height: 1.7; }
    .card-row span { color: var(--text); }
    .card-district { font-size: 0.73rem; color: var(--muted); margin-top: 4px; font-style: italic; min-height: 1.1em; }

    /* ── Buttons ── */
    .btn-header {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); height: 36px; padding: 0 12px;
      font-size: 0.8rem; white-space: nowrap; cursor: pointer; transition: background 0.15s;
    }
    .btn-header:hover { background: #2d333b; }
    .btn-icon {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); width: 42px; height: 42px; font-size: 1.1rem;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s;
    }
    .btn-icon:hover { background: #2d333b; }
    .btn-icon.active { background: #1f3550; border-color: var(--accent); color: var(--accent); }

    /* ── Sidebar internals ── */
    .section-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .slider-wrap { display: flex; flex-direction: column; gap: 6px; }
    .slider-val { font-size: 1.1rem; font-weight: 600; color: var(--accent); }
    input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); }
    input[type=range]::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); }
    /* dual-range thumbs inherit above; keep accent fill via JS gradient */
    .filter-select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 8px 10px;
      font-size: 0.82rem; cursor: pointer; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .filter-select:focus { border-color: var(--accent); }
    .legend { display: flex; flex-direction: column; gap: 7px; }
    .legend-item { display: flex; align-items: center; gap: 9px; font-size: 0.83rem; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .metric-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; }
    .metric-label { font-size: 0.73rem; color: var(--muted); margin-bottom: 4px; }
    .metric-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .status { display: flex; flex-direction: column; gap: 4px; }
    .status-dot { color: var(--green); font-size: 0.82rem; }
    .status-date { color: var(--muted); font-size: 0.75rem; }
    hr { border: none; border-top: 1px solid var(--border); }

    /* ── Leaflet popup ── */
    .leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important; }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 12px 14px !important; min-width: 160px; }
    .popup-conf { font-size: 1.1rem; font-weight: 700; }
    .popup-meta { font-size: 0.82rem; color: var(--muted); margin-top: 6px; line-height: 1.7; }
    .popup-divider { border-top: 1px solid var(--border); margin: 7px 0; }

    /* ── Dual range slider ── */
    .dual-range-wrap { position: relative; height: 28px; margin-top: 4px; }
    .dual-range-wrap input[type=range] {
      position: absolute; width: 100%; top: 50%; transform: translateY(-50%);
      pointer-events: none; background: transparent;
    }
    .dual-range-wrap input[type=range]::-webkit-slider-thumb { pointer-events: all; }
    .dual-range-wrap input[type=range]::-moz-range-thumb     { pointer-events: all; }
    .dual-range-track {
      position: absolute; height: 4px; border-radius: 2px;
      top: 50%; transform: translateY(-50%);
      left: 0; right: 0; background: var(--border);
      pointer-events: none;
    }
    .dual-range-fill {
      position: absolute; height: 4px; border-radius: 2px;
      top: 50%; transform: translateY(-50%);
      background: var(--accent); pointer-events: none;
    }
    .date-range-labels { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* ── District checkboxes ── */
    .check-list {
      display: flex; flex-direction: column; gap: 5px;
      max-height: 130px; overflow-y: auto;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .check-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; cursor: pointer; }
    .check-item input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
    .check-item label { cursor: pointer; color: var(--text); }
    .check-all { border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 2px; }

    /* ── Map controls (independent cards, topright) ── */
    .map-ctrl {
      background: rgba(22,27,34,0.48) !important;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(48,54,61,0.5) !important;
      border-radius: 10px !important;
      padding: 0 !important; overflow: hidden;
    }
    .map-ctrl.active { border-color: #4da6e8 !important; box-shadow: 0 0 0 1px rgba(77,166,232,0.3) !important; }
    .map-ctrl-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: transparent; border: none;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.82rem; padding: 8px 12px;
      cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.2s;
      width: 100%;
    }
    .map-ctrl-btn:hover { background: rgba(255,255,255,0.07); }
    .map-ctrl.active .map-ctrl-btn { color: #4da6e8; }
    .map-ctrl-btn .ctrl-icon { font-size: 1.05rem; }

    /* ZoomIn/ZoomOut cross-fade within one container (CSS grid overlay trick) */
    .zoom-swap { display: grid; width: 100%; }
    .zoom-swap > * {
      grid-area: 1 / 1;         /* both occupy same cell → overlap */
      transition: opacity 0.2s ease;
    }
    .zoom-swap > .hidden-btn { opacity: 0; pointer-events: none; }

    /* ── Copied toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: rgba(63,185,80,0.92); color: #fff;
      padding: 7px 18px; border-radius: 20px; font-size: 0.82rem; font-weight: 500;
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 9999; white-space: nowrap;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Card coordinate & action row ── */
    .card-coord-row { display: flex; align-items: center; }
    .card-actions {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 5px; margin-top: 7px;
    }
    .card-act {
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px; height: 30px;
      font-size: 1rem; color: var(--muted); cursor: pointer;
      text-decoration: none; transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap; letter-spacing: 0.02em;
    }
    .card-act.small-text { font-size: 0.72rem; letter-spacing: 0.04em; font-weight: 500; }
    .card-act:hover  { background: rgba(255,255,255,0.13); color: var(--text); border-color: rgba(255,255,255,0.25); }
    .card-act.flash  { background: rgba(63,185,80,0.2); border-color: var(--green); color: var(--green); }


    /* ── Location pulse ── */
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.9} 50%{transform:scale(1.6);opacity:.3} }
    @keyframes cardFadeOut { to { opacity: 0; transform: translateY(-6px); } }
    .loc-pulse { width:14px;height:14px;border-radius:50%;background:#58a6ff;box-shadow:0 0 0 3px rgba(88,166,255,.4);animation:pulse 2s infinite; }

    /* ── River tooltip ── */
    .leaflet-tooltip.river-tooltip {
      background: rgba(22,27,34,0.88) !important;
      border: 1px solid #4da6e8 !important;
      color: #4da6e8 !important;
      font-size: 0.75rem; padding: 3px 8px;
      border-radius: 6px; box-shadow: none;
    }
    .leaflet-tooltip.river-tooltip::before { display: none; }

  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <img src="geovigil_analytics_logo_transparent_forblack.png" alt="GeoVigil Analytics" class="sidebar-logo">
      <button class="btn-header" onclick="toggleLang()" id="btn-lang-sb">🇬🇧 English</button>
      <hr>

      <!-- Confidence filter -->
      <div class="slider-wrap">
        <div class="section-label" data-i18n="filter_header">Filtros</div>
        <div class="slider-val"><span id="sb-conf-val">50</span>%</div>
        <input type="range" id="sb-slider" min="0" max="100" value="50" step="5" oninput="syncSlider('sb')">
      </div>

      <!-- Date range filter -->
      <div>
        <div class="section-label" data-i18n="filter_date_label">Fecha de detección</div>
        <div class="dual-range-wrap" id="date-range-wrap">
          <div class="dual-range-track"></div>
          <div class="dual-range-fill" id="date-range-fill"></div>
          <input type="range" id="date-range-min" min="0" value="0" step="1" oninput="onDateRange()">
          <input type="range" id="date-range-max" min="0" value="0" step="1" oninput="onDateRange()">
        </div>
        <div class="date-range-labels">
          <span id="date-label-min">—</span>
          <span id="date-label-max">—</span>
        </div>
      </div>

      <!-- District multi-select -->
      <div>
        <div class="section-label" data-i18n="filter_district_label">Distrito / Provincia</div>
        <div class="check-list" id="district-checklist">
          <div class="check-item check-all">
            <input type="checkbox" id="dist-all" checked onchange="onDistAllToggle(this)">
            <label for="dist-all" data-i18n="filter_all">Todas</label>
          </div>
        </div>
      </div>

      <hr>
      <div>
        <div class="section-label" data-i18n="legend_title">Nivel de confianza</div>
        <div class="legend" style="margin-top:8px">
          <div class="legend-item"><span class="dot" style="background:var(--high)"></span><span data-i18n="legend_high">Alta ≥ 85%</span></div>
          <div class="legend-item"><span class="dot" style="background:var(--mid)"></span><span data-i18n="legend_mid">Media 70–84%</span></div>
          <div class="legend-item"><span class="dot" style="background:var(--low)"></span><span data-i18n="legend_low">Baja &lt; 70%</span></div>
        </div>
      </div>
      <hr>
      <div class="metric-card">
        <div class="metric-label" data-i18n="metric_label">Detecciones visibles</div>
        <div class="metric-value" id="sb-metric">— / —</div>
      </div>
      <hr>
      <div class="status">
        <div class="section-label" data-i18n="data_status">Estado</div>
        <div class="status-dot">● <span data-i18n="status_demo">Demo — datos simulados</span></div>
        <div class="status-date"><span data-i18n="last_update">Último lote</span>: 2025-03-19</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Header -->
    <div class="header">
      <div class="header-row">
        <button class="btn-icon" onclick="toggleSidebar()" id="btn-menu">☰</button>
        <div class="header-center">
          <div class="title">🛰️ GeoVigil Analytics</div>
          <div class="subtitle" data-i18n="subtitle">Detección de pistas clandestinas · Perú</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:stretch">
          <button class="btn-header" onclick="toggleLang()" id="btn-lang-top">🇬🇧 English</button>
          <button class="btn-header" onclick="toggleMapTile()" id="btn-tile">🗺 Street</button>
        </div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="filter-bar-row">
        <label data-i18n="slider_label">Confianza mínima (%)</label>
        <input type="range" id="main-slider" min="0" max="100" value="50" step="5" oninput="syncSlider('main')">
        <div class="badge" id="main-conf-val">50%</div>
        <div class="badge" id="main-metric">— / —</div>
      </div>
    </div>

    <!-- Map + card overlay -->
    <div class="map-area">
      <div id="map"></div>

      <!-- Card strip (overlays map bottom) -->
      <div class="card-strip-wrap" id="card-strip-wrap">
        <div class="strip-handle" id="strip-handle">
          <div class="strip-pill" id="strip-pill"></div>
          <button class="strip-collapse-btn" id="strip-collapse-btn" onclick="toggleStrip()">
            <span id="strip-btn-label">▼ <span data-i18n="strip_hide">Ocultar</span></span>
          </button>
        </div>
        <div class="card-strip" id="card-strip"></div>
      </div>
    </div>
  </div>
</div>

  const t = TEXTS[lang];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key] !== undefined) el.textContent = t[key];

  document.getElementById("btn-lang-top").textContent = t.lang_toggle;

  refreshSelectLabels();
  forceRender();
  updateZoomBtn();

let geoCache   = [];

function tierColor(conf) {
  if (conf >= 0.85) return "#E53935";
  if (conf >= 0.70) return "#FB8C00";
  return "#1E88E5";
}

  options: { position: 'topright' },
  onAdd() {
    const wrap = L.DomUtil.create('div', 'leaflet-bar map-ctrl');

    L.DomEvent.disableClickPropagation(wrap);

const RiverControl = L.Control.extend({

const RoadControl = L.Control.extend({

function updateZoomBtn() {
  const t = TEXTS[lang];
  const inTxt    = document.getElementById('zoom-in-text');
  const outTxt   = document.getElementById('zoom-out-text');
  const riverLbl = document.getElementById('river-btn-label');
  if (inTxt)    inTxt.textContent    = t.zoom_in;
  if (outTxt)   outTxt.textContent   = t.zoom_out;
  if (riverLbl) riverLbl.textContent = t.rivers_label;
  const roadLbl = document.getElementById('road-btn-label');
  if (roadLbl) roadLbl.textContent = t.roads_label;
  // Equalize widths of all map-ctrl containers to the widest one
  requestAnimationFrame(() => {
    const ctrls = document.querySelectorAll('.map-ctrl');
    ctrls.forEach(el => el.style.width = '');
    const max = Math.max(...[...ctrls].map(el => el.getBoundingClientRect().width));
    ctrls.forEach(el => el.style.width = max + 'px');
  });
}

function syncZoomControls() {
  const zoomed   = map.getZoom() >= OVERVIEW_ZOOM_THRESHOLD;
  const btnIn    = document.getElementById('btn-zoom-in');
  const btnOut   = document.getElementById('btn-zoom-out');
  // Cross-fade: only toggle class, no display change → no layout shift
  if (btnIn)  btnIn.classList.toggle('hidden-btn',  zoomed);
  if (btnOut) btnOut.classList.toggle('hidden-btn', !zoomed);
}
map.on('zoomend', syncZoomControls);

function flyToOverview() {

function zoomToSelected() {
  if (filteredIndices.length === 0) return;
  const d = DETECTIONS[filteredIndices[selectedFi]];

// ── Date range filter ──────────────────────────────────────────────────────
let ALL_DATES = [];

function initDateRange() {
  const minEl = document.getElementById("date-range-min");
  const maxEl = document.getElementById("date-range-max");
  const max   = ALL_DATES.length - 1;
  minEl.max = maxEl.max = max;
  minEl.value = 0;
  maxEl.value = max;
  updateDateRangeUI();
}

function onDateRange() {
  const minEl = document.getElementById("date-range-min");
  const maxEl = document.getElementById("date-range-max");
  let lo = parseInt(minEl.value), hi = parseInt(maxEl.value);
  if (lo > hi) { [lo, hi] = [hi, lo]; minEl.value = lo; maxEl.value = hi; }
  updateDateRangeUI();
  renderAll();
}

function updateDateRangeUI() {
  const minEl = document.getElementById("date-range-min");
  const maxEl = document.getElementById("date-range-max");
  const lo = parseInt(minEl.value), hi = parseInt(maxEl.value);
  const total = ALL_DATES.length - 1 || 1;
  document.getElementById("date-label-min").textContent = ALL_DATES[lo] || "—";
  document.getElementById("date-label-max").textContent = ALL_DATES[hi] || "—";
  // fill track
  const fill = document.getElementById("date-range-fill");
  fill.style.left  = (lo / total * 100) + "%";
  fill.style.right = ((1 - hi / total) * 100) + "%";
}

function getSelectedDateRange() {
  const lo = parseInt(document.getElementById("date-range-min").value);
  const hi = parseInt(document.getElementById("date-range-max").value);
  return { from: ALL_DATES[lo], to: ALL_DATES[hi] };
}

// ── District multi-select ──────────────────────────────────────────────────
let selectedDistricts = new Set(); // empty = all

function populateDistrictChecklist() {
  const list  = document.getElementById("district-checklist");
  const t     = TEXTS[lang];
  const dists = [...new Set(geoCache.filter(d => d && d !== "—"))].sort();

  // Keep existing selections
  const allCheck = document.getElementById("dist-all");

  // Remove old district items (keep the "all" row)
  list.querySelectorAll(".dist-item").forEach(el => el.remove());

  dists.forEach(d => {
    const item = document.createElement("div");
    item.className = "check-item dist-item";
    const checked = selectedDistricts.size === 0 || selectedDistricts.has(d);
    item.innerHTML = `<input type="checkbox" id="dist-${d}" ${checked ? "checked" : ""} onchange="onDistCheck()">
                      <label for="dist-${d}">${d}</label>`;
    list.appendChild(item);
  });

  // sync "all" checkbox
  if (allCheck) allCheck.checked = selectedDistricts.size === 0;
}

function onDistAllToggle(el) {
  selectedDistricts.clear();
  document.querySelectorAll(".dist-item input").forEach(cb => { cb.checked = el.checked; });
  if (!el.checked) {
    // nothing selected → treat as all
    el.checked = true;
  }
  renderAll();
}

function onDistCheck() {
  const checks = [...document.querySelectorAll(".dist-item input")];
  const checked = checks.filter(c => c.checked).map(c => {
    const label = c.nextElementSibling?.textContent || "";
    return label;
  });
  // get district names from labels
  selectedDistricts = new Set(
    [...document.querySelectorAll(".dist-item")]
      .filter(item => item.querySelector("input").checked)
      .map(item => item.querySelector("label").textContent)
  );
  if (selectedDistricts.size === checks.length) selectedDistricts.clear(); // all checked = no filter
  const allCb = document.getElementById("dist-all");
  if (allCb) allCb.checked = selectedDistricts.size === 0;
  renderAll();
}

// ── Filters ────────────────────────────────────────────────────────────────
function getFilteredIndices() {
  const minConf  = parseInt(document.getElementById("main-slider").value) / 100;
  const { from, to } = getSelectedDateRange();

  return DETECTIONS
    .map((d, i) => i)
    .filter(i => {
      const d = DETECTIONS[i];
      if (d.conf < minConf) return false;
      if (from && d.date < from) return false;
      if (to   && d.date > to)   return false;
      if (selectedDistricts.size > 0 && !selectedDistricts.has(geoCache[i])) return false;
      return true;
    })
    .sort((a, b) => DETECTIONS[b].conf - DETECTIONS[a].conf);
}

function refreshSelectLabels() {
  populateDistrictChecklist();
}

// ── Markers & cards — keyed maps for per-item diffing ─────────────────────
let markerMap       = new Map();  // detIdx → Leaflet marker
let cardMap         = new Map();  // detIdx → DOM element
let filteredIndices = [];
let selectedFi      = 0;
const fadingCards   = new Set(); // cards mid-fade-out, not yet removed from DOM

// Build a single card DOM element (no innerHTML on strip)
function buildCard(detIdx) {
  const t    = TEXTS[lang];
  const d    = DETECTIONS[detIdx];
  const color = tierColor(d.conf);
  const geo  = geoCache[detIdx] || '—';
  const coord = `${d.lat.toFixed(4)}, ${d.lon.toFixed(4)}`;
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lon}`;
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.detidx = detIdx;
  const dotClass = d.status === 'active' ? 'card-dot-active' : 'card-dot-unconfirmed';
  const isEnsemble = d.source && d.source.toLowerCase().startsWith('ensemble');
  const sourceLabel = isEnsemble ? t.source_ensemble : (d.source || '—');
  const sourceTitle = isEnsemble ? 'Sentinel-2 + Planet Basemaps' : '';
  el.innerHTML = `
    <div class="card-header">
      <div class="card-conf" style="color:${color}">${(d.conf*100).toFixed(1)}%</div>
      <span class="card-dot ${dotClass}" title="${d.status}"></span>
    </div>
    <div class="card-row">🔄 <span>${d.confirmed_at}</span></div>
    <div class="card-row">📅 <span>${d.detected_at}</span></div>
    <div class="card-row">🛰️ <span title="${sourceTitle}" style="${sourceTitle ? 'cursor:help;text-decoration:underline dotted' : ''}">${sourceLabel}</span></div>
    <div class="card-row card-coord-row">📍 <span>${coord}</span></div>
    <div class="card-actions">
      <button class="card-act" id="copy-act-${detIdx}"
        onclick="copyCoord(event,'${coord}','copy-act-${detIdx}')" title="${t.btn_copy}">⧉</button>
      <a class="card-act" href="${mapsUrl}" target="_blank" rel="noopener"
        onclick="event.stopPropagation()" title="${t.btn_maps}">🗺</a>
      <button class="card-act small-text"
        onclick="downloadGpx(event,${d.lat},${d.lon},'${(d.conf*100).toFixed(1)}','${d.date}','${geo}')"
        title="GPX">GPX</button>
      <button class="card-act small-text"
        onclick="downloadKml(event,${d.lat},${d.lon},'${(d.conf*100).toFixed(1)}','${d.date}','${geo}')"
        title="KML">KML</button>
    </div>
    ${geo && geo !== '—' ? `<div class="card-district">🏛 ${geo}</div>` : ''}`;
  el.addEventListener('click', e => {
    if (e.target.closest('.card-act, a')) return;
    const fi = filteredIndices.indexOf(detIdx);
    if (fi < 0) return;
    selectFi(fi, true);
  });
  return el;
}

function markerFadeIn(marker) {
  const path = marker._path;
  if (!path) return;
  path.style.transition = 'none';
  path.style.opacity    = '0';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    path.style.transition = 'opacity 0.3s ease';
    path.style.opacity    = '1';
    // Clear inline styles after animation so Leaflet manages the path normally.
    // Leaving transition on the path causes a delay when the browser lazy-renders
    // off-screen SVG elements as they scroll into the viewport.
    setTimeout(() => { path.style.transition = ''; path.style.opacity = ''; }, 350);
  }));
}

function markerFadeOut(marker) {
  const path = marker._path;
  if (path) {
    path.style.transition = 'opacity 0.25s ease';
    path.style.opacity    = '0';
    setTimeout(() => map.removeLayer(marker), 270);
  } else {
    map.removeLayer(marker);
  }
}

// Full rebuild (used on language change)
function forceRender() {
  markerMap.forEach(m => map.removeLayer(m));
  cardMap.forEach(c => c.remove());
  markerMap.clear();
  cardMap.clear();
  filteredIndices = [];
  renderAll();
}

function renderAll() {
  const newIndices = getFilteredIndices();
  const newSet     = new Set(newIndices);
  const oldSet     = new Set(filteredIndices);

  // Nothing changed — skip entirely
  if (newIndices.length === filteredIndices.length &&
      newIndices.every((v, i) => v === filteredIndices[i])) {
    updateMetrics();
    return;
  }

  // Abort any in-progress fade-outs: remove those DOM nodes immediately so
  // they don't end up at the wrong position in a subsequent re-sort
  fadingCards.forEach(c => c.remove());
  fadingCards.clear();

  const strip = document.getElementById('card-strip');

  // Collect cards/markers to remove (keep references before clearing from map)
  const cardsToFade   = [];
  const markersToFade = [];
  for (const detIdx of oldSet) {
    if (newSet.has(detIdx)) continue;
    const m = markerMap.get(detIdx);
    if (m) { markerMap.delete(detIdx); markersToFade.push(m); }
    const c = cardMap.get(detIdx);
    if (c) { cardMap.delete(detIdx); cardsToFade.push(c); }
  }
  // Fade-out markers immediately (not layout-dependent)
  markersToFade.forEach(markerFadeOut);

  filteredIndices = newIndices;

  // Collect new detIdx values for fade-in after applySelection
  const toAdd = [];

  // Add newly visible items (invisible for now — fade-in triggered after applySelection)
  for (const detIdx of newSet) {
    if (oldSet.has(detIdx)) continue;
    toAdd.push(detIdx);

    const d      = DETECTIONS[detIdx];
    const color  = tierColor(d.conf);
    const marker = L.circleMarker([d.lat, d.lon], {
      radius: 10, color, weight: 2, fillColor: color, fillOpacity: 0.75,
    });
    marker.on('click', () => {
      const fi = filteredIndices.indexOf(detIdx);
      if (fi < 0) return;
      if (stripCollapsed) toggleStrip();
      selectFi(fi, true);
      scrollCardTo(fi);
    });
    marker.addTo(map);
    markerMap.set(detIdx, marker);

    const card = buildCard(detIdx);
    card.style.transition = 'none';
    card.style.opacity    = '0';
    card.style.transform  = 'translateY(6px)';
    strip.appendChild(card);
    cardMap.set(detIdx, card);
  }

  // Re-sort remaining (visible) cards in filteredIndices order
  for (const detIdx of filteredIndices) {
    const c = cardMap.get(detIdx);
    if (c) strip.appendChild(c);
  }

  // Move fading-out cards to the END of the strip (off-screen right)
  // so they don't appear to the left of visible cards during fade-out
  cardsToFade.forEach(c => strip.appendChild(c));

  // Trigger card fade-out via CSS animation (keyframes start immediately,
  // no rAF timing dependency unlike transitions)
  cardsToFade.forEach(c => {
    fadingCards.add(c);
    c.style.animation = 'cardFadeOut 0.22s ease forwards';
    setTimeout(() => { c.remove(); fadingCards.delete(c); }, 240);
  });

  strip.onscroll = onStripScroll;

  updateMetrics();
  if (selectedFi >= filteredIndices.length) selectedFi = 0;

  // applySelection sets correct opacity (1 or 0.6) on all cards BEFORE fade-in
  applySelection(selectedFi, false);

  // Trigger fade-in using the opacity applySelection just set
  for (const detIdx of toAdd) {
    const card   = cardMap.get(detIdx);
    const marker = markerMap.get(detIdx);
    if (card) {
      const target = card.style.opacity || '0.6';
      card.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        card.style.transition = 'opacity 0.25s ease, transform 0.25s ease, border-color 0.2s, box-shadow 0.2s';
        card.style.opacity    = target;
        card.style.transform  = 'translateY(0)';
      }));
    }
    if (marker) markerFadeIn(marker);
  }
}

function selectFi(fi, panMap) {
  selectedFi = fi;
  const detailView = map.getZoom() >= OVERVIEW_ZOOM_THRESHOLD;
  if (detailView) {
    zoomToSelected();
  } else {
    applySelection(fi, panMap);
  }
  applySelection(fi, !detailView && panMap);
  scrollCardTo(fi);
}

function applySelection(fi, panMap) {
  filteredIndices.forEach((detIdx, i) => {
    const color = tierColor(DETECTIONS[detIdx].conf);
    const sel   = i === fi;
    const marker = markerMap.get(detIdx);
    if (marker) {
      marker.setStyle({ radius: sel ? 13 : 10, weight: sel ? 3 : 2, fillOpacity: sel ? 1 : 0.65, color: sel ? '#ffffff' : color, fillColor: color });
      if (sel) marker.bringToFront();
    }
    const card = cardMap.get(detIdx);
    if (card) {
      card.classList.toggle('selected', sel);
      card.style.borderColor = sel ? color : 'rgba(48,54,61,0.7)';
      card.style.boxShadow   = sel ? `0 0 0 2px ${color}55` : 'none';
      card.style.opacity     = sel ? '1' : '0.6';
    }
  });
  if (panMap && filteredIndices[fi] !== undefined) {
    const d = DETECTIONS[filteredIndices[fi]];
    map.panTo([d.lat, d.lon], { animate: true, duration: 0.5 });
  }
}

// ── Card actions ───────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
}

function copyCoord(event, coord, btnId) {
  event.stopPropagation();
  const t = TEXTS[lang];
  const doShow = () => {
    showToast(`✅ ${t.btn_copied}  ${coord}`);
    if (btnId) {
      const btn = document.getElementById(btnId);
      if (btn) { btn.classList.add("flash"); setTimeout(() => btn.classList.remove("flash"), 1800); }
    }
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(coord).then(doShow).catch(() => { fallbackCopy(coord); doShow(); });
  } else { fallbackCopy(coord); doShow(); }
}

function downloadGpx(event, lat, lon, conf, date, district) {
  event.stopPropagation();
  const name = `GeoVigil Analytics ${conf}%`;
  const desc = `${conf}% | ${date} | ${district}`;
  const xml  = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GeoVigil Analytics" xmlns="http://www.topografix.com/GPX/1/1">
  <wpt lat="${lat}" lon="${lon}">
    <name>${name}</name>
    <desc>${desc}</desc>
  </wpt>
</gpx>`;
  triggerDownload(xml, `geovigil-analytics_${lat}_${lon}.gpx`, "application/gpx+xml");
}

function downloadKml(event, lat, lon, conf, date, district) {
  event.stopPropagation();
  const name = `GeoVigil Analytics ${conf}%`;
  const desc = `${conf}% | ${date} | ${district}`;
  const xml  = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <Placemark>
      <name>${name}</name>
      <description>${desc}</description>
      <Point><coordinates>${lon},${lat},0</coordinates></Point>
    </Placemark>
  </Document>
</kml>`;
  triggerDownload(xml, `geovigil-analytics_${lat}_${lon}.kml`, "application/vnd.google-earth.kml+xml");
}

function triggerDownload(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement("a"), { href: url, download: filename });
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.cssText = "position:fixed;opacity:0";
  document.body.appendChild(ta); ta.select(); document.execCommand("copy");
  document.body.removeChild(ta);
}


function scrollCardTo(fi) {
  const detIdx = filteredIndices[fi];
  const card   = cardMap.get(detIdx);
  if (!card) return;
  const strip = document.getElementById('card-strip');
  strip.scrollTo({ left: card.offsetLeft - strip.clientWidth / 2 + card.offsetWidth / 2, behavior: 'smooth' });
}

let scrollTimer = null;
function onStripScroll() {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    const strip  = document.getElementById('card-strip');
    const center = strip.scrollLeft + strip.clientWidth / 2;
    let minDist = Infinity, bestFi = 0;
    filteredIndices.forEach((detIdx, fi) => {
      const card = cardMap.get(detIdx);
      if (!card) return;
      const dist = Math.abs(card.offsetLeft + card.offsetWidth / 2 - center);
      if (dist < minDist) { minDist = dist; bestFi = fi; }
    });
    if (bestFi !== selectedFi) { selectedFi = bestFi; applySelection(bestFi, true); }
  }, 80);
}

// ── Card strip collapse ────────────────────────────────────────────────────
let stripCollapsed = false;

function toggleStrip() {
  stripCollapsed = !stripCollapsed;
  const wrap = document.getElementById("card-strip-wrap");
  const btn  = document.getElementById("strip-btn-label");
  const t    = TEXTS[lang];
  wrap.classList.toggle("collapsed", stripCollapsed);
  btn.innerHTML = stripCollapsed
    ? `▲ ${t.strip_show}`
    : `▼ <span data-i18n="strip_hide">${t.strip_hide}</span>`;
}

// Swipe-down to collapse (mobile)
(function () {
  const handle = document.getElementById("strip-handle");
  let startY = 0;
  handle.addEventListener("touchstart", e => { startY = e.touches[0].clientY; }, { passive: true });
  handle.addEventListener("touchend",   e => {
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 50 && !stripCollapsed) toggleStrip();
    if (dy < -50 && stripCollapsed)  toggleStrip();
  }, { passive: true });
})();


// ── Slider sync ────────────────────────────────────────────────────────────
function updateConfSliderFill(val) {
  const pct    = val + "%";
  // Right side (val→100%) = accent, left side (0→val%) = border color
  const grad   = `linear-gradient(to right, var(--border) 0%, var(--border) ${pct}, var(--accent) ${pct}, var(--accent) 100%)`;
  document.getElementById("sb-slider").style.background   = grad;
  document.getElementById("main-slider").style.background = grad;
}

function syncSlider(source) {
  const val = document.getElementById(source === "sb" ? "sb-slider" : "main-slider").value;
  document.getElementById("sb-slider").value   = val;
  document.getElementById("main-slider").value = val;
  document.getElementById("sb-conf-val").textContent   = val;
  document.getElementById("main-conf-val").textContent = val + "%";
  updateConfSliderFill(val);
  renderAll();
}

function updateMetrics() {
  const c = `${filteredIndices.length} / ${DETECTIONS.length}`;
  document.getElementById("sb-metric").textContent   = c;
  document.getElementById("main-metric").textContent = c;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb  = document.getElementById("sidebar");
  const btn = document.getElementById("btn-menu");
  const isOpen = sb.classList.toggle("open");
  btn.classList.toggle("active", isOpen);
  setTimeout(() => map.invalidateSize(), 270);
}

// ── Rivers (Natural Earth GeoJSON via CloudFront CDN) ─────────────────────
// Pre-hosted public dataset — no API key, no timeout issues
let riversVisible  = false;
let riverLayer     = null;
let riverGeoCache  = null;  // cache fetched GeoJSON in memory

const RIVER_GEO_URL = 'https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_rivers_lake_centerlines.geojson';

async function toggleRivers() {
  riversVisible = !riversVisible;
  const ctrlEl = riverCtrl.getContainer();
  if (ctrlEl) ctrlEl.classList.toggle('active', riversVisible);

  if (!riversVisible) {
    if (riverLayer) { map.removeLayer(riverLayer); riverLayer = null; }
    return;
  }

  // Fetch once, then reuse from cache
  if (!riverGeoCache) {
    try {
      const res = await fetch(RIVER_GEO_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      riverGeoCache = await res.json();
    } catch (err) {
      console.warn('River GeoJSON fetch failed:', err);
      showToast(TEXTS[lang].rivers_error);
      riversVisible = false;
      if (ctrlEl) ctrlEl.classList.remove('active');
      return;
    }
  }

  if (riverLayer) map.removeLayer(riverLayer);
  riverLayer = L.geoJSON(riverGeoCache, {
    style: f => ({
      color:   '#4da6e8',
      weight:  (f.properties?.scalerank ?? 9) <= 4 ? 2.5 : 1.2,
      opacity: 0.75,
    }),
    onEachFeature(f, layer) {
      const name = f.properties?.name || f.properties?.name_en;
      if (name) layer.bindTooltip(name, { sticky: true, className: 'river-tooltip' });
    },
  }).addTo(map);
  riverLayer.bringToBack();
}

// ── Roads (ESRI World Transportation tile overlay) ─────────────────────────
// Transparent tile layer — works at any zoom, no file size limit
let roadsVisible = false;
let roadLayer    = null;

function toggleRoads() {
  roadsVisible = !roadsVisible;
  const ctrlEl = roadCtrl.getContainer();
  if (ctrlEl) ctrlEl.classList.toggle('active', roadsVisible);

  if (!roadsVisible) {
    if (roadLayer) { map.removeLayer(roadLayer); roadLayer = null; }
    return;
  }

  roadLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}',
    { attribution: '© <a href="https://www.esri.com">Esri</a>', maxZoom: 19, opacity: 0.85 }
  ).addTo(map);
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById("sb-conf-val").textContent   = "50";
document.getElementById("main-conf-val").textContent = "50%";
updateConfSliderFill(50);

fetch('./data/detections.json')
  .then(r => r.json())
  .then(json => {
    DETECTIONS = (json.detections || [])
      .filter(d => d.status !== 'inactive')
      .map(d => ({
        lat:          d.lat,
        lon:          d.lon,
        conf:         d.confidence,
        date:         (d.confirmed_at || d.detected_at || '').slice(0, 10),
        detected_at:  (d.detected_at  || '').slice(0, 10),
        confirmed_at: (d.confirmed_at || d.detected_at || '').slice(0, 10),
        status:       d.status || 'active',
        source:       d.source || '—',
        district:     d.district || '—',
      }));
    geoCache  = DETECTIONS.map(d => d.district);
    ALL_DATES = [...new Set(DETECTIONS.map(d => d.confirmed_at))].sort();
    initDateRange();
    populateDistrictChecklist();
    renderAll();
    setTimeout(() => { scrollCardTo(0); updateZoomBtn(); syncZoomControls(); }, 100);
  })
  .catch(err => {
    console.error('Failed to load detections.json:', err);
  });
</script>
